<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2d5016 0%, #4a7c23 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 3rem;
            max-width: 500px;
        }
        .construction {
            font-size: 1.5rem;
            padding: 1rem 2rem;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <h1>Predium</h1>
    <p class="subtitle">Herramienta de diagnóstico predial para la transición agroecológica</p>
    <p class="construction">En construcción...</p>
</body>
</html>
